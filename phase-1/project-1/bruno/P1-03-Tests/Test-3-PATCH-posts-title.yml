info:
  name: Test 3 - PATCH /posts/1 (modifier title)
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/posts/{{postId}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Updated Title"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("Title is updated", function() {
          expect(res.body.title).to.equal("Updated Title");
        });

        test("Content is unchanged", function() {
          expect(res.body.content).to.equal("World");
        });
