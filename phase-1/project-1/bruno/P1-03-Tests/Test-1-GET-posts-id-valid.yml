info:
  name: Test 1 - GET /posts/1 (valide)
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/posts/{{postId}}"
  headers:
    - name: Content-Type
      value: application/json

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });

        test("Post has correct title", function() {
          expect(res.body.title).to.equal("Hello");
        });

        test("Post has correct content", function() {
          expect(res.body.content).to.equal("World");
        });

        test("Post has id", function() {
          expect(res.body).to.have.property("id");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
