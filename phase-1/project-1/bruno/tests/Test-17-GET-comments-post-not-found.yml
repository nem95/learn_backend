info:
  name: Test 17 - GET /posts/999/comments (post inexistant → 404)
  type: http
  seq: 18

http:
  method: GET
  url: "{{baseUrl}}/posts/999/comments"
  headers:
    - name: Content-Type
      value: application/json

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 404 (Not Found)", function() {
          expect(res.status).to.equal(404);
        });

        test("Response has message", function() {
          expect(res.body).to.have.property("message");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
