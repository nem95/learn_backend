info:
  name: Setup - POST /posts
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/posts"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Hello",
        "content": "World"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          bru.setVar("postId", res.body.id);
        }
    - type: tests
      code: |-
        test("Status is 201 (Created)", function() {
          expect(res.status).to.equal(201);
        });

        test("Post has id", function() {
          expect(res.body).to.have.property("id");
        });

        test("Post has title", function() {
          expect(res.body.title).to.equal("Hello");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
