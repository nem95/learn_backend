info:
  name: Test 16 - POST /posts/999/comments (post inexistant → 404)
  type: http
  seq: 17

http:
  method: POST
  url: "{{baseUrl}}/posts/999/comments"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "text": "Comment"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 404 (Not Found)", function() {
          expect(res.status).to.equal(404);
        });

        test("Response has message", function() {
          expect(res.body).to.have.property("message");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
